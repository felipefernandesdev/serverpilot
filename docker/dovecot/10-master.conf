service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

service lmtp {
  unix_listener lmtp {
    mode = 0666
  }
  inet_listener lmtp {
    address = 0.0.0.0
    port = 24
  }
}

service auth {
  unix_listener auth-userdb {
    mode = 0666
  }
}
