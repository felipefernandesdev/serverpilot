version: '3.8'

services:
  postgres:
    image: docker.io/postgres:16-alpine
    container_name: serverpilot-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: serverpilot
      POSTGRES_PASSWORD: serverpilot
      POSTGRES_DB: serverpilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U serverpilot']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/redis:7-alpine
    container_name: serverpilot-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: docker.io/mailhog/mailhog:latest
    container_name: serverpilot-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'
    environment:
      MH_API_BIND_ADDR: ':8025'
      MH_SMTP_BIND_ADDR: ':1025'

  adminer:
    image: docker.io/adminer:latest
    container_name: serverpilot-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  # ===========================================================================
  # SERVER INFRASTRUCTURE (managed by the control panel)
  # NOTE: privileged ports (<1024) are remapped for rootless Podman
  # ===========================================================================

  nginx:
    image: docker.io/nginx:alpine
    container_name: serverpilot-nginx
    restart: unless-stopped
    ports:
      - '8082:80'     # HTTP (remapped from 80)
      - '8443:443'    # HTTPS (remapped from 443)
    volumes:
      - nginx_vhosts:/etc/nginx/conf.d
      - site_data:/var/www
      - nginx_logs:/var/log/nginx

  mariadb:
    image: docker.io/mariadb:lts
    container_name: serverpilot-mariadb
    restart: unless-stopped
    ports:
      - '3307:3306'
    environment:
      MARIADB_ROOT_PASSWORD: serverpilot_root
      MARIADB_DATABASE: serverpilot_client
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 10s
      timeout: 5s
      retries: 5

  postfix:
    image: docker.io/catatnight/postfix:latest
    container_name: serverpilot-postfix
    restart: unless-stopped
    ports:
      - '2525:25'     # SMTP (remapped from 25)
      - '2587:587'    # Submission (remapped from 587)
    environment:
      maildomain: serverpilot.local
      smtp_user: 'mailuser:mailpass'
      relayhost: 'mailhog:1025'
    volumes:
      - postfix_config:/etc/postfix
      - postfix_spool:/var/spool/postfix
    depends_on:
      - mailhog

  dovecot:
    image: docker.io/eilandert/dovecot:latest
    container_name: serverpilot-dovecot
    restart: unless-stopped
    ports:
      - '1430:143'    # IMAP (remapped from 143)
      - '9993:993'    # IMAPS (remapped from 993)
    volumes:
      - mail_data:/srv/mail
      - ./dovecot/10-auth.conf:/etc/dovecot/conf.d/10-auth.conf:ro,Z
      - ./dovecot/auth-sql.conf.ext:/etc/dovecot/conf.d/auth-sql.conf.ext:ro,Z
      - ./dovecot/local.conf:/etc/dovecot/local.conf:ro,Z
    environment:
      TZ: UTC

  snappymail:
    image: docker.io/djmaze/snappymail:latest
    container_name: serverpilot-snappymail
    restart: unless-stopped
    ports:
      - '9001:8888'
    volumes:
      - snappymail_data:/var/lib/snappymail

  powerdns:
    image: docker.io/powerdns/pdns-auth-49:latest
    container_name: serverpilot-powerdns
    restart: unless-stopped
    ports:
      - '5354:5300/tcp' # DNS (remapped from 53, 5353 is mDNS)
      - '5354:5300/udp' # DNS
      - '8081:8081'     # API
    volumes:
      - ./powerdns/pdns.conf:/etc/powerdns/pdns.conf:ro,Z

volumes:
  postgres_data:
  redis_data:
  nginx_vhosts:
  site_data:
  nginx_logs:
  mariadb_data:
  postfix_config:
  postfix_spool:
  dovecot_config:
  mail_data:
  snappymail_data:
