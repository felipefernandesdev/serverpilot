version: '3.8'

services:
  # PostgreSQL for production-like development
  postgres:
    image: postgres:16-alpine
    container_name: serverpilot-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: serverpilot
      POSTGRES_PASSWORD: serverpilot
      POSTGRES_DB: serverpilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U serverpilot']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: serverpilot-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Mailhog for email testing (development SMTP capture)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: serverpilot-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'  # SMTP
      - '8025:8025'  # Web UI
    environment:
      MH_API_BIND_ADDR: ':8025'
      MH_SMTP_BIND_ADDR: ':1025'

  # Adminer for database management
  adminer:
    image: adminer:latest
    container_name: serverpilot-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  # ===========================================================================
  # SERVER INFRASTRUCTURE (managed by the control panel)
  # ===========================================================================

  # Nginx web server — serves client sites via virtual hosts
  nginx:
    image: nginx:alpine
    container_name: serverpilot-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - nginx_vhosts:/etc/nginx/conf.d    # vhost configs (written by app)
      - site_data:/var/www                # document roots
      - nginx_logs:/var/log/nginx
    depends_on:
      - postgres

  # MariaDB — database server for client provisioning
  mariadb:
    image: mariadb:lts
    container_name: serverpilot-mariadb
    restart: unless-stopped
    ports:
      - '3307:3306'
    environment:
      MARIADB_ROOT_PASSWORD: serverpilot_root
      MARIADB_DATABASE: serverpilot_client
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 10s
      timeout: 5s
      retries: 5

  # Postfix SMTP server — receives/delivers email for client domains
  postfix:
    image: ubuntu/postfix:latest
    container_name: serverpilot-postfix
    restart: unless-stopped
    ports:
      - '25:25'
      - '587:587'
    environment:
      POSTFIX_HOSTNAME: mail.serverpilot.local
      POSTFIX_MYORIGIN: serverpilot.local
      POSTFIX_MYDESTINATION: 'localhost, serverpilot.local'
      POSTFIX_RELAYHOST: 'mailhog:1025'  # relay to mailhog in dev
    volumes:
      - postfix_config:/etc/postfix
      - postfix_spool:/var/spool/postfix
    depends_on:
      - mailhog
      - dovecot

  # Dovecot IMAP server — mailbox storage and IMAP/POP3 access
  dovecot:
    image: docker.io/eilandert/dovecot:latest
    container_name: serverpilot-dovecot
    restart: unless-stopped
    ports:
      - '143:143'
      - '993:993'
    volumes:
      - mail_data:/srv/mail
      - ./dovecot/10-auth.conf:/etc/dovecot/conf.d/10-auth.conf:ro
      - ./dovecot/10-mail.conf:/etc/dovecot/conf.d/10-mail.conf:ro
      - ./dovecot/10-master.conf:/etc/dovecot/conf.d/10-master.conf:ro
      - ./dovecot/dovecot-sql.conf.ext:/etc/dovecot/dovecot-sql.conf.ext:ro
    environment:
      TZ: UTC
    depends_on:
      - postgres

  # SnappyMail — lightweight webmail client
  snappymail:
    image: djmaze/snappymail:latest
    container_name: serverpilot-snappymail
    restart: unless-stopped
    ports:
      - '9001:80'
    volumes:
      - snappymail_data:/var/lib/snappymail

  # PowerDNS — authoritative DNS server with REST API
  powerdns:
    image: powerdns/pdns-auth-49:latest
    container_name: serverpilot-powerdns
    restart: unless-stopped
    ports:
      - '53:53/tcp'
      - '53:53/udp'
      - '8081:8081'
    environment:
      PDNS_API_KEY: pdns_api_key_dev
      PDNS_WEBSERVER_ADDRESS: 0.0.0.0
      PDNS_WEBSERVER_PORT: 8081
      PDNS_LAUNCH: gpgsql
      PDNS_GPGSQL_HOST: postgres
      PDNS_GPGSQL_PORT: 5432
      PDNS_GPGSQL_USER: serverpilot
      PDNS_GPGSQL_PASSWORD: serverpilot
      PDNS_GPGSQL_DBNAME: serverpilot
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  nginx_vhosts:
  site_data:
  nginx_logs:
  mariadb_data:
  postfix_config:
  postfix_spool:
  dovecot_config:
  mail_data:
  snappymail_data:
